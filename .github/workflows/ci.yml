name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f -name "train_idle.py" -print
          python -c "import sys, os; print('cwd=', os.getcwd()); print('sys.path[0]=', sys.path[0]); print('workspace contains train_idle.py=', os.path.exists('train_idle.py'))"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Syntax check
        run: python -m compileall -q .

      - name: Tests
        run: pytest